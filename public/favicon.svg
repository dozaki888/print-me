<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Paper sheet sticking out top -->
  <rect x="10" y="2" width="12" height="10" fill="#ffffff"/>
  <rect x="10" y="2" width="12" height="1" fill="#808080"/>
  <rect x="10" y="2" width="1" height="10" fill="#808080"/>
  <rect x="21" y="2" width="1" height="10" fill="#404040"/>

  <!-- Printer body highlight (top-left) -->
  <rect x="4" y="10" width="24" height="1" fill="#ffffff"/>
  <rect x="4" y="10" width="1" height="14" fill="#ffffff"/>

  <!-- Printer body -->
  <rect x="5" y="11" width="22" height="12" fill="#c0c0c0"/>

  <!-- Printer body shadow (bottom-right) -->
  <rect x="4" y="23" width="24" height="1" fill="#404040"/>
  <rect x="27" y="10" width="1" height="14" fill="#404040"/>
  <rect x="5" y="22" width="22" height="1" fill="#808080"/>
  <rect x="26" y="11" width="1" height="12" fill="#808080"/>

  <!-- Paper slot (top of printer) -->
  <rect x="8" y="13" width="16" height="2" fill="#808080"/>
  <rect x="8" y="13" width="16" height="1" fill="#404040"/>

  <!-- Paper output slot (bottom) -->
  <rect x="8" y="19" width="16" height="2" fill="#808080"/>
  <rect x="8" y="19" width="16" height="1" fill="#404040"/>

  <!-- Green power light -->
  <rect x="22" y="15" width="3" height="3" fill="#00ff00"/>
  <rect x="22" y="15" width="3" height="1" fill="#008000"/>
  <rect x="22" y="15" width="1" height="3" fill="#008000"/>

  <!-- Paper coming out output slot -->
  <rect x="10" y="21" width="12" height="6" fill="#ffffff"/>
  <rect x="10" y="21" width="12" height="1" fill="#c0c0c0"/>
  <rect x="10" y="21" width="1" height="6" fill="#c0c0c0"/>
</svg>
